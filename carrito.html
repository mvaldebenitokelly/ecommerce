<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Carrito simulado de CosmoStore.">
  <title>CosmoStore | Carrito</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  >
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body data-page="cart">
  <header>
    <nav class="navbar navbar-expand-lg bg-dark navbar-dark sticky-top shadow-sm" aria-label="Navegación principal">
      <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">CosmoStore</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuPrincipal" aria-controls="menuPrincipal" aria-expanded="false" aria-label="Abrir menú de navegación">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="menuPrincipal">
          <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
            <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
            <li class="nav-item"><a class="nav-link" href="carrito.html">Carrito</a></li>
            <li class="nav-item ms-lg-2">
              <a class="btn btn-outline-light position-relative" href="carrito.html">
                Carrito
                <span id="cart-count" class="badge text-bg-warning ms-2" aria-live="polite">0</span>
              </a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
  </header>

  <main class="py-5">
    <div class="container">
      <section class="mb-4">
        <h1 class="mb-2">Carrito simulado</h1>
        <p class="text-secondary mb-0">Ejemplo de interacción básica con JavaScript y localStorage.</p>
      </section>

      <section class="row g-4">
        <div class="col-12 col-lg-8">
          <div class="table-responsive bg-white rounded-4 shadow-sm p-3">
            <table class="table align-middle mb-0">
              <thead>
                <tr>
                  <th scope="col">Producto</th>
                  <th scope="col">Precio</th>
                  <th scope="col">Acción</th>
                </tr>
              </thead>
              <tbody id="cart-items">
                <!-- Filas cargadas con JavaScript -->
              </tbody>
            </table>
          </div>
        </div>

        <div class="col-12 col-lg-4">
          <aside class="bg-white rounded-4 shadow-sm p-4">
            <h2 class="h4">Resumen</h2>
            <p class="mb-2">Cantidad de productos: <strong id="cart-total-items">0</strong></p>
            <p class="mb-4">Total estimado: <strong id="cart-total-price">$0</strong></p>
            <button id="btn-clear-cart" class="btn btn-outline-danger w-100">Vaciar carrito</button>
          </aside>
        </div>
      </section>
    </div>
  </main>

  <footer class="bg-dark text-light py-4 mt-5">
    <div class="container text-center">
      <p class="mb-0">CosmoStore - Proyecto académico de Front End.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
